<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ChurnShield</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="login-container">
    <h1 style="text-align: center;">Login to ChurnShield!</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <ul class="flashes">
            {% for category, message in messages %}
                <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
{% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="button">Login</button>
    </form>
    <p class="register-link" style="text-align: center;">Don't have an account? <a href="{{ url_for('register') }}">Register Here</a></p>
  </div>


<script>
   // Auto-hide flash messages after 4 seconds
   setTimeout(() => {
      document.querySelectorAll('.flashes li').forEach(el => {
         el.style.transition = 'opacity 0.5s ease';
         el.style.opacity = '0';
         setTimeout(() => el.remove(), 500); // Remove from DOM
      });
   }, 500);
</script>

</body>
</html>
